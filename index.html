<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Vault — The Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700;900&family=Barlow+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0f1e;
  --surface: #111827;
  --surface2: #1a2235;
  --border: #1e2d45;
  --accent: #38bdf8;
  --accent2: #818cf8;
  --hot: #f43f5e;
  --green: #10b981;
  --text: #f1f5f9;
  --muted: #64748b;
  --muted2: #94a3b8;
  --radius: 10px;
  --card-radius: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; overflow-x: hidden; }

/* ── NOISE TEXTURE OVERLAY ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.4;
}

/* ── NAV ── */
nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10, 15, 30, 0.92);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 20px;
  height: 64px;
}
.nav-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.8rem;
  letter-spacing: 2px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  white-space: nowrap;
  text-decoration: none;
}
.nav-logo span { color: var(--text); -webkit-text-fill-color: var(--text); }
.nav-search {
  flex: 1;
  max-width: 400px;
  position: relative;
}
.nav-search input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 9px 16px 9px 40px;
  border-radius: 50px;
  font-size: 0.88rem;
  font-family: 'Barlow', sans-serif;
  transition: border-color 0.2s;
}
.nav-search input:focus { outline: none; border-color: var(--accent); }
.nav-search input::placeholder { color: var(--muted); }
.nav-search svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); width: 16px; height: 16px; }
.nav-links { display: flex; gap: 4px; margin-left: auto; }
.nav-link { padding: 7px 14px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; color: var(--muted2); text-decoration: none; transition: all 0.15s; cursor: pointer; border: none; background: none; font-family: 'Barlow', sans-serif; }
.nav-link:hover { color: var(--text); background: var(--surface2); }
.nav-link.active { color: var(--accent); }

/* ── HERO ── */
.hero {
  position: relative;
  padding: 80px 24px 60px;
  text-align: center;
  overflow: hidden;
}
.hero-bg {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(56,189,248,0.12) 0%, transparent 70%),
              radial-gradient(ellipse 50% 40% at 80% 50%, rgba(129,140,248,0.08) 0%, transparent 60%);
  pointer-events: none;
}
.hero-eyebrow {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 16px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.hero-eyebrow::before, .hero-eyebrow::after { content: ''; display: block; width: 30px; height: 1px; background: var(--accent); opacity: 0.5; }
.hero h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(3.5rem, 10vw, 7rem);
  line-height: 0.95;
  letter-spacing: 3px;
  color: var(--text);
  margin-bottom: 20px;
}
.hero h1 span {
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero-sub {
  font-size: 1.05rem;
  color: var(--muted2);
  max-width: 460px;
  margin: 0 auto 32px;
  line-height: 1.6;
}
.hero-stats {
  display: flex;
  gap: 32px;
  justify-content: center;
  flex-wrap: wrap;
}
.hero-stat { text-align: center; }
.hero-stat-val {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.2rem;
  letter-spacing: 1px;
  color: var(--accent);
  line-height: 1;
}
.hero-stat-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 2px; }

/* ── SPORT NAV TABS ── */
.sport-tabs {
  display: flex;
  gap: 8px;
  padding: 24px 24px 0;
  overflow-x: auto;
  scrollbar-width: none;
  border-bottom: 1px solid var(--border);
}
.sport-tabs::-webkit-scrollbar { display: none; }
.sport-tab {
  padding: 10px 20px 12px;
  border-radius: 10px 10px 0 0;
  border: none;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
  background: transparent;
  color: var(--muted2);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
}
.sport-tab:hover { color: var(--text); }
.sport-tab.active { color: var(--accent); border-bottom-color: var(--accent); background: rgba(56,189,248,0.06); }

/* ── FILTER STRIP ── */
.filter-strip {
  display: flex;
  gap: 10px;
  padding: 16px 24px;
  flex-wrap: wrap;
  align-items: center;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.fselect {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 7px 12px;
  border-radius: 8px;
  font-size: 0.82rem;
  font-family: 'Barlow', sans-serif;
  cursor: pointer;
  transition: border-color 0.15s;
}
.fselect:focus { outline: none; border-color: var(--accent); }
.fselect option { background: #1a2235; }
.filter-pill {
  padding: 6px 14px;
  border-radius: 50px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted2);
  font-size: 0.78rem;
  font-weight: 600;
  font-family: 'Barlow', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.filter-pill:hover, .filter-pill.active { border-color: var(--accent); color: var(--accent); background: rgba(56,189,248,0.08); }
.results-info { margin-left: auto; font-size: 0.78rem; color: var(--muted); }

/* ── SECTION HEADERS ── */
.section { padding: 40px 24px 16px; }
.section-header { display: flex; align-items: baseline; gap: 14px; margin-bottom: 20px; }
.section-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.8rem;
  letter-spacing: 2px;
  color: var(--text);
}
.section-count { font-size: 0.78rem; color: var(--muted); font-weight: 600; background: var(--surface2); border: 1px solid var(--border); padding: 2px 10px; border-radius: 50px; }
.section-line { flex: 1; height: 1px; background: var(--border); }

/* ── JUST ADDED ROW ── */
.just-added-scroll {
  display: flex;
  gap: 16px;
  overflow-x: auto;
  padding: 0 24px 12px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.just-added-scroll::-webkit-scrollbar { height: 4px; }
.just-added-scroll::-webkit-scrollbar-track { background: transparent; }
.just-added-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* ── CARD GRID ── */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
  padding: 0 24px;
}

/* ── CARD ── */
.card-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--card-radius);
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
  position: relative;
  flex-shrink: 0;
}
.just-added-scroll .card-item { width: 185px; }
.card-item:hover {
  transform: translateY(-4px);
  border-color: rgba(56,189,248,0.4);
  box-shadow: 0 12px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(56,189,248,0.15);
}
.card-photo {
  width: 100%;
  aspect-ratio: 3/4;
  background: linear-gradient(135deg, var(--surface2) 0%, #0d1829 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
.card-photo img { width: 100%; height: 100%; object-fit: cover; }
.card-photo-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  color: var(--muted);
}
.card-photo-placeholder svg { width: 36px; height: 36px; opacity: 0.4; }
.card-photo-placeholder span { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
.new-badge {
  position: absolute;
  top: 10px;
  left: 10px;
  background: var(--hot);
  color: #fff;
  font-size: 0.65rem;
  font-weight: 700;
  font-family: 'Barlow Condensed', sans-serif;
  letter-spacing: 0.1em;
  padding: 2px 8px;
  border-radius: 4px;
  text-transform: uppercase;
}
.card-body { padding: 12px; }
.card-player {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1.2;
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-meta { font-size: 0.75rem; color: var(--muted2); margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; min-height: 20px; }
.badge {
  font-size: 0.62rem;
  font-weight: 700;
  font-family: 'Barlow Condensed', sans-serif;
  letter-spacing: 0.06em;
  padding: 2px 7px;
  border-radius: 4px;
  text-transform: uppercase;
}
.badge-rc { background: rgba(132, 204, 22, 0.15); color: #84cc16; border: 1px solid rgba(132,204,22,0.3); }
.badge-auto { background: rgba(167, 139, 250, 0.15); color: #a78bfa; border: 1px solid rgba(167,139,250,0.3); }
.badge-numbered { background: rgba(251, 146, 60, 0.15); color: #fb923c; border: 1px solid rgba(251,146,60,0.3); }
.badge-parallel { background: rgba(34, 211, 238, 0.12); color: #22d3ee; border: 1px solid rgba(34,211,238,0.25); }
.badge-mem { background: rgba(52, 211, 153, 0.12); color: #34d399; border: 1px solid rgba(52,211,153,0.25); }
.badge-grade { background: rgba(56,189,248,0.12); color: var(--accent); border: 1px solid rgba(56,189,248,0.25); }
.card-footer { display: flex; align-items: center; justify-content: space-between; }
.card-price {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--accent);
}
.btn-buy {
  background: var(--accent);
  color: #000;
  border: none;
  padding: 6px 14px;
  border-radius: 6px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-buy:hover { background: #7dd3fc; transform: scale(1.04); }

/* ── FEATURED CARD ── */
.featured-wrap { padding: 0 24px; margin-bottom: 8px; }
.featured-card {
  background: var(--surface);
  border: 1px solid rgba(56,189,248,0.25);
  border-radius: 16px;
  display: grid;
  grid-template-columns: 240px 1fr;
  overflow: hidden;
  position: relative;
}
.featured-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 60% 80% at 0% 50%, rgba(56,189,248,0.06) 0%, transparent 60%);
  pointer-events: none;
}
.featured-photo {
  aspect-ratio: 3/4;
  background: linear-gradient(135deg, #1a2235 0%, #0d1829 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.featured-photo img { width: 100%; height: 100%; object-fit: cover; }
.featured-tag {
  position: absolute;
  top: 16px;
  left: 16px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #000;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  padding: 4px 12px;
  border-radius: 4px;
  text-transform: uppercase;
}
.featured-info { padding: 32px 36px; display: flex; flex-direction: column; justify-content: center; gap: 12px; }
.featured-sport { font-size: 0.75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; }
.featured-player { font-family: 'Bebas Neue', sans-serif; font-size: 2.6rem; letter-spacing: 2px; line-height: 1; color: var(--text); }
.featured-set { font-size: 0.9rem; color: var(--muted2); }
.featured-badges { display: flex; gap: 6px; flex-wrap: wrap; }
.featured-price { font-family: 'Bebas Neue', sans-serif; font-size: 2.8rem; letter-spacing: 2px; color: var(--accent); }
.btn-buy-lg {
  background: linear-gradient(135deg, var(--accent), #60a5fa);
  color: #000;
  border: none;
  padding: 12px 28px;
  border-radius: 8px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s;
  align-self: flex-start;
}
.btn-buy-lg:hover { opacity: 0.9; transform: scale(1.03); }

/* ── EMPTY STATE ── */
.empty-section { text-align: center; padding: 48px 24px; color: var(--muted); }
.empty-section p { font-size: 0.9rem; }

/* ── DETAIL MODAL ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.8);
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  backdrop-filter: blur(6px);
}
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  width: 100%;
  max-width: 640px;
  max-height: 90vh;
  overflow-y: auto;
  position: relative;
  animation: slideUp 0.25s ease;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
.modal-close {
  position: absolute; top: 16px; right: 16px;
  width: 32px; height: 32px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--muted2); font-size: 1rem;
  transition: all 0.15s; z-index: 1;
}
.modal-close:hover { color: var(--text); border-color: var(--accent); }
.modal-photo {
  width: 100%; height: 260px;
  background: linear-gradient(135deg, var(--surface2) 0%, #0d1829 100%);
  display: flex; align-items: center; justify-content: center;
  border-radius: 18px 18px 0 0;
  overflow: hidden;
}
.modal-photo img { width: 100%; height: 100%; object-fit: contain; padding: 16px; }
.modal-body { padding: 24px; }
.modal-player { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 2px; color: var(--text); margin-bottom: 4px; }
.modal-meta { font-size: 0.88rem; color: var(--muted2); margin-bottom: 16px; }
.modal-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.modal-specs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.spec { background: var(--surface2); border-radius: 8px; padding: 10px 14px; }
.spec-label { font-size: 0.68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 3px; }
.spec-val { font-size: 0.9rem; font-weight: 600; color: var(--text); }
.modal-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 16px; border-top: 1px solid var(--border); }
.modal-price { font-family: 'Bebas Neue', sans-serif; font-size: 2.4rem; letter-spacing: 2px; color: var(--accent); }
.modal-notes { background: var(--surface2); border-radius: 8px; padding: 12px 14px; margin-bottom: 16px; font-size: 0.85rem; color: var(--muted2); line-height: 1.5; }

/* ── FOOTER ── */
footer {
  margin-top: 80px;
  border-top: 1px solid var(--border);
  padding: 32px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
}
.footer-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 2px; color: var(--muted); }
.footer-text { font-size: 0.78rem; color: var(--muted); }
.footer-link { color: var(--accent); text-decoration: none; }
.footer-link:hover { text-decoration: underline; }

/* ── LOAD DATA BANNER ── */
.load-banner {
  background: rgba(56,189,248,0.08);
  border: 1px solid rgba(56,189,248,0.25);
  border-radius: 10px;
  margin: 20px 24px 0;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
}
.load-banner p { font-size: 0.85rem; color: var(--muted2); flex: 1; }
.load-banner p strong { color: var(--text); }
.btn-load {
  background: var(--accent);
  color: #000;
  border: none;
  padding: 8px 18px;
  border-radius: 7px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  cursor: pointer;
  white-space: nowrap;
}
.btn-load:hover { background: #7dd3fc; }

/* ── RESPONSIVE ── */
@media (max-width: 700px) {
  .featured-card { grid-template-columns: 1fr; }
  .featured-photo { aspect-ratio: 16/9; }
  .featured-info { padding: 20px; }
  .featured-player { font-size: 1.8rem; }
  .featured-price { font-size: 2rem; }
  .card-grid { grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 12px; }
  nav { padding: 0 16px; gap: 12px; }
  .nav-search { max-width: none; }
  .modal-specs { grid-template-columns: 1fr; }
}
@media (max-width: 480px) {
  .hero { padding: 48px 16px 40px; }
  .section, .featured-wrap, .sport-tabs, .filter-strip, .just-added-scroll, .card-grid { padding-left: 16px; padding-right: 16px; }
  .card-grid { grid-template-columns: 1fr 1fr; }
}

/* ── ANIMATIONS ── */
.card-item { animation: fadeUp 0.3s ease both; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="#">Card<span>Vault</span></a>
  <div class="nav-search">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="globalSearch" placeholder="Search player, set, year…" oninput="applyFilters()">
  </div>
  <div class="nav-links">
    <button class="nav-link" onclick="scrollToSection('just-added')">New</button>
    <button class="nav-link" onclick="scrollToSection('all-cards')">All Cards</button>
  </div>
</nav>



<!-- HERO -->
<div class="hero">
  <div class="hero-bg"></div>
  <div class="hero-eyebrow">Premium Sports Cards</div>
  <h1>Card<span>Vault</span><br>The Shop</h1>
  <p class="hero-sub">Browse, filter, and buy authenticated sports cards. Every card personally sourced and verified.</p>
  <div class="hero-stats">
    <div class="hero-stat">
      <div class="hero-stat-val" id="statTotal">—</div>
      <div class="hero-stat-label">Cards Listed</div>
    </div>
    <div class="hero-stat">
      <div class="hero-stat-val" id="statSports">—</div>
      <div class="hero-stat-label">Sports</div>
    </div>
    <div class="hero-stat">
      <div class="hero-stat-val" id="statAutos">—</div>
      <div class="hero-stat-label">Autographs</div>
    </div>
    <div class="hero-stat">
      <div class="hero-stat-val" id="statGraded">—</div>
      <div class="hero-stat-label">Graded Cards</div>
    </div>
  </div>
</div>

<!-- SPORT TABS -->
<div class="sport-tabs" id="sportTabs">
  <button class="sport-tab active" data-sport="" onclick="setSportTab(this)">All Sports</button>
</div>

<!-- FILTER STRIP -->
<div class="filter-strip">
  <span style="font-size:0.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em">Filter</span>
  <select class="fselect" id="filterGrade" onchange="applyFilters()">
    <option value="">All Grades</option>
    <optgroup label="Raw"><option value="Raw">Raw</option></optgroup>
    <optgroup label="PSA">
      <option value="PSA 10">PSA 10</option><option value="PSA 9">PSA 9</option>
      <option value="PSA 8">PSA 8</option><option value="PSA 7">PSA 7</option>
    </optgroup>
    <optgroup label="BGS">
      <option value="BGS 10">BGS 10</option><option value="BGS 9.5">BGS 9.5</option>
      <option value="BGS 9">BGS 9</option><option value="BGS 8.5">BGS 8.5</option>
    </optgroup>
    <optgroup label="SGC">
      <option value="SGC 10">SGC 10</option><option value="SGC 9.5">SGC 9.5</option>
      <option value="SGC 9">SGC 9</option><option value="SGC 8.5">SGC 8.5</option>
    </optgroup>
    <optgroup label="CGC">
      <option value="CGC 10">CGC 10</option><option value="CGC 9.5">CGC 9.5</option>
    </optgroup>
  </select>
  <select class="fselect" id="filterPrice" onchange="applyFilters()">
    <option value="">Any Price</option>
    <option value="0-20">Under $20</option>
    <option value="20-50">$20 – $50</option>
    <option value="50-100">$50 – $100</option>
    <option value="100-250">$100 – $250</option>
    <option value="250+">$250+</option>
  </select>
  <button class="filter-pill" id="pillAuto" onclick="togglePill('pillAuto','auto')">✍ Autos</button>
  <button class="filter-pill" id="pillRC" onclick="togglePill('pillRC','rc')">🌟 Rookies</button>
  <button class="filter-pill" id="pillNumbered" onclick="togglePill('pillNumbered','numbered')">🔢 Numbered</button>
  <button class="filter-pill" id="pillMem" onclick="togglePill('pillMem','mem')">🏷 Memorabilia</button>
  <span class="results-info" id="resultsInfo"></span>
</div>

<!-- FEATURED CARD -->
<div id="featuredSection"></div>

<!-- JUST ADDED -->
<div id="justAddedSection"></div>

<!-- SPORT SECTIONS -->
<div id="sportSections"></div>

<!-- ALL CARDS (filtered view) -->
<div id="allCardsSection" style="display:none">
  <div class="section">
    <div class="section-header">
      <div class="section-title">All Cards</div>
      <div class="section-line"></div>
      <span class="section-count" id="allCardsCount"></span>
    </div>
  </div>
  <div class="card-grid" id="allCardsGrid" style="padding-bottom:32px"></div>
</div>

<!-- DETAIL MODAL -->
<div class="overlay" id="detailOverlay" style="display:none" onclick="if(event.target===this)closeDetail()">
  <div class="modal" id="detailModal">
    <button class="modal-close" onclick="closeDetail()">✕</button>
    <div class="modal-photo" id="modalPhoto"></div>
    <div class="modal-body">
      <div class="modal-player" id="modalPlayer"></div>
      <div class="modal-meta" id="modalMeta"></div>
      <div class="modal-badges" id="modalBadges"></div>
      <div class="modal-specs" id="modalSpecs"></div>
      <div id="modalNotesWrap"></div>
      <div class="modal-footer">
        <div class="modal-price" id="modalPrice"></div>
        <button class="btn-buy-lg" id="modalBuyBtn" onclick="buyCard()">Buy on Shopify →</button>
      </div>
    </div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <div class="footer-logo">CardVault</div>
  <div class="footer-text">All sales handled securely via Shopify. Questions? <a class="footer-link" href="mailto:you@email.com">Contact us</a></div>
</footer>

<script>
// ── DATA ──────────────────────────────────────────────────────────────
let allCards = [];
let activeFilters = { sport: '', auto: false, rc: false, numbered: false, mem: false };
let currentCard = null;

const SHOPIFY_BASE = 'https://your-store.myshopify.com/products/'; // <-- update this



// ── AUTO FETCH FROM GITHUB ─────────────────────────────────────────────
const CARDS_URL = 'https://raw.githubusercontent.com/GraysonW909/CardVault-The-Shop/main/cards.json';

async function loadInventory() {
  try {
    const res = await fetch('cards.json');
    if (!res.ok) throw new Error('Not found');
    const data = await res.json();
    if (!Array.isArray(data)) throw new Error('Invalid format');
    allCards = data.filter(c => c.status !== 'sold');
    render();
  } catch(err) {
    allCards = [];
    render();
  }
}

// ── RENDER ─────────────────────────────────────────────────────────────
function render() {
  updateStats();
  buildSportTabs();
  renderFeatured();
  renderJustAdded();
  renderSportSections();
}

function updateStats() {
  const avail = allCards.filter(c => c.status !== 'sold');
  const sports = new Set(avail.map(c => c.sport).filter(Boolean));
  const autos = avail.filter(c => c.auto).length;
  const graded = avail.filter(c => c.condition && c.condition !== 'Raw' && c.condition !== '').length;
  document.getElementById('statTotal').textContent = avail.length;
  document.getElementById('statSports').textContent = sports.size;
  document.getElementById('statAutos').textContent = autos;
  document.getElementById('statGraded').textContent = graded;
}

function buildSportTabs() {
  const tabsEl = document.getElementById('sportTabs');
  const sports = [...new Set(allCards.filter(c=>c.status!=='sold').map(c=>c.sport).filter(Boolean))];
  const order = ['Baseball','Football','Basketball','Hockey','Soccer','College Football','College Basketball','Other'];
  sports.sort((a,b) => {
    const ai = order.indexOf(a); const bi = order.indexOf(b);
    return (ai===-1?99:ai) - (bi===-1?99:bi);
  });
  tabsEl.innerHTML = `<button class="sport-tab active" data-sport="" onclick="setSportTab(this)">All Sports</button>`;
  sports.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'sport-tab';
    btn.dataset.sport = s;
    btn.textContent = s;
    btn.onclick = function(){ setSportTab(this); };
    tabsEl.appendChild(btn);
  });
}

function setSportTab(btn) {
  document.querySelectorAll('.sport-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilters.sport = btn.dataset.sport || '';
  applyFilters();
}

function togglePill(id, key) {
  activeFilters[key] = !activeFilters[key];
  document.getElementById(id).classList.toggle('active', activeFilters[key]);
  applyFilters();
}

function applyFilters() {
  const search = document.getElementById('globalSearch').value.toLowerCase();
  const grade = document.getElementById('filterGrade').value;
  const priceRange = document.getElementById('filterPrice').value;

  let filtered = allCards.filter(c => c.status !== 'sold');

  if (activeFilters.sport) filtered = filtered.filter(c => c.sport === activeFilters.sport);
  if (activeFilters.auto) filtered = filtered.filter(c => c.auto);
  if (activeFilters.rc) filtered = filtered.filter(c => c.rookie);
  if (activeFilters.numbered) filtered = filtered.filter(c => c.numbered);
  if (activeFilters.mem) filtered = filtered.filter(c => c.mem);
  if (grade) filtered = filtered.filter(c => (c.condition||'').startsWith(grade.split(' ')[0]) && c.condition === grade);
  if (priceRange) {
    const [lo, hi] = priceRange.split('-').map(Number);
    if (priceRange.endsWith('+')) filtered = filtered.filter(c => (c.price||0) >= 250);
    else filtered = filtered.filter(c => (c.price||0) >= lo && (c.price||0) <= hi);
  }
  if (search) filtered = filtered.filter(c =>
    [c.player,c.set,c.year,c.team,c.parallel,c.condition,c.cardnum].some(f => (f||'').toLowerCase().includes(search))
  );

  const hasFilter = search || grade || priceRange || activeFilters.auto || activeFilters.rc || activeFilters.numbered || activeFilters.mem || activeFilters.sport;

  document.getElementById('resultsInfo').textContent = `${filtered.length} card${filtered.length!==1?'s':''}`;

  if (hasFilter) {
    // Show flat grid
    document.getElementById('featuredSection').style.display = 'none';
    document.getElementById('justAddedSection').style.display = 'none';
    document.getElementById('sportSections').style.display = 'none';
    document.getElementById('allCardsSection').style.display = 'block';
    document.getElementById('allCardsCount').textContent = filtered.length + ' cards';
    renderGrid(document.getElementById('allCardsGrid'), filtered);
  } else {
    document.getElementById('featuredSection').style.display = '';
    document.getElementById('justAddedSection').style.display = '';
    document.getElementById('sportSections').style.display = '';
    document.getElementById('allCardsSection').style.display = 'none';
    render();
  }
}

function renderFeatured() {
  const avail = allCards.filter(c=>c.status!=='sold');
  if (!avail.length) { document.getElementById('featuredSection').innerHTML = ''; return; }
  // Pick most expensive available card as featured
  const card = [...avail].sort((a,b) => (b.price||0)-(a.price||0))[0];
  document.getElementById('featuredSection').innerHTML = `
    <div class="section"><div class="section-header"><div class="section-title">Featured Card</div><div class="section-line"></div></div></div>
    <div class="featured-wrap">
      <div class="featured-card" onclick="openDetail('${card.id}')" style="cursor:pointer">
        <div class="featured-photo">
          <div class="featured-tag">⭐ Featured</div>
          ${card.photo ? `<img src="${card.photo}" alt="${card.player}">` : photoPlaceholderLg()}
        </div>
        <div class="featured-info">
          <div class="featured-sport">${card.sport||''}${card.year?' · '+card.year:''}</div>
          <div class="featured-player">${card.player||'Unknown'}</div>
          <div class="featured-set">${card.set||''}${card.cardnum?' '+card.cardnum:''}</div>
          <div class="featured-badges">${buildBadges(card)}</div>
          <div class="featured-price">$${fmtPrice(card.price)}</div>
          <button class="btn-buy-lg" onclick="event.stopPropagation();buyCardById('${card.id}')">Buy on Shopify →</button>
        </div>
      </div>
    </div>
  `;
}

function renderJustAdded() {
  const avail = allCards.filter(c=>c.status!=='sold');
  // Sort by addedAt desc, take top 8
  const newest = [...avail].sort((a,b) => (b.addedAt||0)-(a.addedAt||0)).slice(0,8);
  if (!newest.length) { document.getElementById('justAddedSection').innerHTML=''; return; }
  const cards = newest.map(c => cardHTML(c, true)).join('');
  document.getElementById('justAddedSection').innerHTML = `
    <div class="section" id="just-added"><div class="section-header"><div class="section-title">Just Added</div><div class="section-line"></div><span class="section-count">${newest.length} new</span></div></div>
    <div class="just-added-scroll">${cards}</div>
  `;
}

function renderSportSections() {
  const avail = allCards.filter(c=>c.status!=='sold');
  const order = ['Baseball','Football','Basketball','Hockey','Soccer','College Football','College Basketball','College Baseball','Other'];
  const sports = [...new Set(avail.map(c=>c.sport).filter(Boolean))];
  sports.sort((a,b) => {
    const ai=order.indexOf(a); const bi=order.indexOf(b);
    return (ai===-1?99:ai)-(bi===-1?99:bi);
  });
  let html = '';
  sports.forEach(sport => {
    const sportCards = avail.filter(c=>c.sport===sport);
    if (!sportCards.length) return;
    const emoji = {Baseball:'⚾',Football:'🏈',Basketball:'🏀',Hockey:'🏒',Soccer:'⚽','College Football':'🏈','College Basketball':'🏀','College Baseball':'⚾'}[sport]||'🃏';
    html += `
      <div class="section"><div class="section-header">
        <div class="section-title">${emoji} ${sport}</div>
        <div class="section-line"></div>
        <span class="section-count">${sportCards.length} card${sportCards.length!==1?'s':''}</span>
      </div></div>
      <div class="card-grid" style="padding-bottom:32px">${sportCards.slice(0,12).map(c=>cardHTML(c,false)).join('')}</div>
    `;
    if (sportCards.length > 12) {
      html += `<div style="text-align:center;padding:0 24px 32px"><button class="filter-pill" style="font-size:0.85rem;padding:9px 24px" onclick="filterBySport('${sport}')">View all ${sportCards.length} ${sport} cards →</button></div>`;
    }
  });
  if (!html) html = '<div class="empty-section"><p>No cards loaded yet. Import your inventory above.</p></div>';
  document.getElementById('sportSections').innerHTML = `<div id="all-cards">${html}</div>`;
}

function filterBySport(sport) {
  document.querySelectorAll('.sport-tab').forEach(b => {
    b.classList.toggle('active', b.dataset.sport === sport);
  });
  activeFilters.sport = sport;
  applyFilters();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderGrid(el, cards) {
  el.innerHTML = cards.map(c => cardHTML(c, false)).join('');
}

// ── CARD HTML ─────────────────────────────────────────────────────────
function cardHTML(c, isNew) {
  return `
    <div class="card-item" onclick="openDetail('${c.id}')">
      <div class="card-photo">
        ${isNew ? '<div class="new-badge">New</div>' : ''}
        ${c.photo ? `<img src="${c.photo}" alt="${c.player}">` : photoPlaceholder()}
      </div>
      <div class="card-body">
        <div class="card-player">${c.player||'Unknown'}</div>
        <div class="card-meta">${[c.year,c.set,c.cardnum].filter(Boolean).join(' · ')}</div>
        <div class="card-badges">${buildBadges(c)}</div>
        <div class="card-footer">
          <div class="card-price">$${fmtPrice(c.price)}</div>
          <button class="btn-buy" onclick="event.stopPropagation();buyCardById('${c.id}')">Buy</button>
        </div>
      </div>
    </div>
  `;
}

function buildBadges(c) {
  let b = '';
  if (c.rookie) b += '<span class="badge badge-rc">RC</span>';
  if (c.auto) b += '<span class="badge badge-auto">Auto</span>';
  if (c.numbered) b += `<span class="badge badge-numbered">${c.numbered}</span>`;
  if (c.parallel && c.parallel !== 'Base') b += `<span class="badge badge-parallel">${c.parallel}</span>`;
  if (c.mem) b += '<span class="badge badge-mem">MEM</span>';
  if (c.condition && c.condition !== 'Raw') b += `<span class="badge badge-grade">${c.condition}</span>`;
  return b;
}

function photoPlaceholder() {
  return `<div class="card-photo-placeholder">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
    <span>No Photo</span>
  </div>`;
}

function photoPlaceholderLg() {
  return `<div class="card-photo-placeholder" style="flex-direction:column;gap:12px">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1" style="width:60px;height:60px;opacity:0.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
    <span style="font-size:0.8rem;color:var(--muted)">Photo Coming Soon</span>
  </div>`;
}

function fmtPrice(p) {
  if (!p && p!==0) return '—';
  return Number(p).toLocaleString('en-US', {minimumFractionDigits:2,maximumFractionDigits:2});
}

// ── DETAIL MODAL ──────────────────────────────────────────────────────
function openDetail(id) {
  const c = allCards.find(x => x.id === id);
  if (!c) return;
  currentCard = c;

  document.getElementById('modalPhoto').innerHTML = c.photo
    ? `<img src="${c.photo}" alt="${c.player}">`
    : photoPlaceholderLg();

  document.getElementById('modalPlayer').textContent = c.player || 'Unknown';
  document.getElementById('modalMeta').textContent = [c.year, c.set, c.cardnum, c.sport, c.team].filter(Boolean).join(' · ');
  document.getElementById('modalBadges').innerHTML = buildBadges(c);

  const specs = [
    c.condition && ['Grade / Condition', c.condition],
    c.parallel && c.parallel !== 'Base' && ['Parallel', c.parallel],
    c.numbered && ['Print Run', c.numbered],
    c.team && ['Team', c.team],
    c.sport && ['Sport', c.sport],
    c.year && ['Year', c.year],
  ].filter(Boolean);

  document.getElementById('modalSpecs').innerHTML = specs.map(([l,v]) => `
    <div class="spec"><div class="spec-label">${l}</div><div class="spec-val">${v}</div></div>
  `).join('');

  document.getElementById('modalNotesWrap').innerHTML = c.notes
    ? `<div class="modal-notes">${c.notes}</div>` : '';

  document.getElementById('modalPrice').textContent = `$${fmtPrice(c.price)}`;
  document.getElementById('detailOverlay').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  document.getElementById('detailOverlay').style.display = 'none';
  document.body.style.overflow = '';
  currentCard = null;
}

function buyCard() {
  if (!currentCard) return;
  buyCardById(currentCard.id);
}

function buyCardById(id) {
  const c = allCards.find(x => x.id === id);
  if (!c) return;
  // If card has a shopifyUrl set, use it. Otherwise build a search URL.
  const url = c.shopifyUrl || `${SHOPIFY_BASE}${encodeURIComponent((c.player||'card').toLowerCase().replace(/\s+/g,'-'))}`;
  window.open(url, '_blank');
}

function scrollToSection(id) {
  const el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── KEYBOARD ──────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDetail();
});

// ── INIT ──────────────────────────────────────────────────────────────
loadInventory();
</script>
</body>
</html>
